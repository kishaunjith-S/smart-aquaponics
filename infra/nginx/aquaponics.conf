# Aquaponics monitoring API — reverse proxy to FastAPI on localhost:5001
#
# Routes:
#   / and everything not matched below  -> FastAPI (for /docs, /health, /api/*, /auth/*, /v1/*, /chat, /api-keys)
#
# Tomorrow we add Next.js static files at / and FastAPI moves under /api/

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Logs
    access_log /var/log/nginx/aquaponics-access.log;
    error_log  /var/log/nginx/aquaponics-error.log;

    # Reasonable body limit for ingest batches (default 1MB is fine, set explicit)
    client_max_body_size 2M;

    # All requests proxy to FastAPI for now
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
